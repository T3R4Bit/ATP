<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATP Trading Bot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='chart.min.js') }}"></script>
    <style>
        body { background-color: #f4f7f9; font-family: Arial, sans-serif; }
        .container { margin-top: 40px; }
        h1 { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        table { background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th { background-color: #2c3e50; color: white; }
        td, th { text-align: center; }
        .chart-container { margin-top: 40px; background-color: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>ATP Trading Bot Dashboard</h1>

    <!-- Trades Table -->
    <table class="table table-striped table-bordered" id="tradesTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Price</th>
                <th>RSI</th>
                <th>Signal</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="5">Loading...</td></tr>
        </tbody>
    </table>

    <!-- Price + RSI Chart -->
    <div class="chart-container">
        <canvas id="priceRSIChart" height="200"></canvas>
    </div>

    <!-- Balance / Equity Curve -->
    <div class="chart-container">
        <canvas id="balanceChart" height="150"></canvas>
    </div>
</div>

<script>
let priceRSIChart;
let balanceChart;

async function fetchTrades() {
    try {
        const response = await fetch('/api/trades');
        const trades = await response.json();

        // Update table
        const tbody = document.querySelector("#tradesTable tbody");
        tbody.innerHTML = "";
        if(trades.length === 0){
            tbody.innerHTML = '<tr><td colspan="5">No trades yet</td></tr>';
        } else {
            trades.forEach(t => {
                tbody.innerHTML += `<tr>
                    <td>${t.time}</td>
                    <td>${t.price}</td>
                    <td>${t.rsi}</td>
                    <td>${t.signal}</td>
                    <td>${t.balance}</td>
                </tr>`;
            });
        }

        const labels = trades.map(t => t.time);
        const prices = trades.map(t => t.price);
        const rsis = trades.map(t => t.rsi);
        const balances = trades.map(t => t.balance);

        // BUY/SELL markers
        const pointColors = trades.map(t => t.signal === "BUY" ? 'green' : t.signal === "SELL" ? 'red' : '#007bff');

        // Price + RSI chart
        if(!priceRSIChart){
            const ctx = document.getElementById('priceRSIChart').getContext('2d');
            priceRSIChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Price',
                            data: prices,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0,123,255,0.1)',
                            tension: 0.2,
                            yAxisID: 'yPrice',
                            pointBackgroundColor: pointColors,
                            pointRadius: 4
                        },
                        {
                            label: 'RSI',
                            data: rsis,
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40,167,69,0.1)',
                            tension: 0.2,
                            yAxisID: 'yRSI',
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    stacked: false,
                    plugins: {
                        title: { display: true, text: 'Price & RSI' },
                        legend: { position: 'top' }
                    },
                    scales: {
                        yPrice: { type: 'linear', position: 'left', title: { display: true, text: 'Price (USD)' } },
                        yRSI: { type: 'linear', position: 'right', title: { display: true, text: 'RSI' }, min:0, max:100, grid: { drawOnChartArea: false } },
                        x: { title: { display: true, text: 'Time' } }
                    }
                }
            });
        } else {
            priceRSIChart.data.labels = labels;
            priceRSIChart.data.datasets[0].data = prices;
            priceRSIChart.data.datasets[0].pointBackgroundColor = pointColors;
            priceRSIChart.data.datasets[1].data = rsis;
            priceRSIChart.update();
        }

        // Balance / Equity chart
        if(!balanceChart){
            const ctx2 = document.getElementById('balanceChart').getContext('2d');
            balanceChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Balance',
                        data: balances,
                        borderColor: '#ffc107',
                        backgroundColor: 'rgba(255,193,7,0.2)',
                        tension: 0.2,
                        fill: true,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { title: { display: true, text: 'Balance / Equity Curve' } },
                    scales: {
                        x: { title: { display: true, text: 'Time' } },
                        y: { title: { display: true, text: 'Balance (USD)' } }
                    }
                }
            });
        } else {
            balanceChart.data.labels = labels;
            balanceChart.data.datasets[0].data = balances;
            balanceChart.update();
        }

    } catch (err) {
        console.error("Error fetching trades:", err);
    }
}

// Initial load & refresh every 5 seconds
fetchTrades();
setInterval(fetchTrades, 5000);
</script>

</body>
</html>
